# ArgoCD v9.1.0 (ArgoCD v3.2.0) Configuration for Homelab
# Documentation: https://argo-cd.readthedocs.io/

global:
  domain: argocd.homelab.local

# Server configuration
server:
  # Expose via LoadBalancer
  service:
    type: LoadBalancer
    annotations: {}

  # Enable insecure mode (no TLS) for simplicity
  # Access via http://LOADBALANCER_IP
  extraArgs:
    - --insecure

  # Prometheus metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Disable dex (OAuth) for single-user setup
dex:
  enabled: false

# Disable notifications controller (not needed for homelab)
notifications:
  enabled: false

# Application controller - manages sync
controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Repo server
repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Redis for caching
redis:
  enabled: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# ArgoCD v3.x Compatibility Settings
# These settings preserve v2.x behavior during migration
configs:
  cm:
    # Preserve v2 RBAC behavior - fine-grained RBAC inheritance
    # In v3, update/delete no longer automatically apply to sub-resources
    # Setting this to false preserves v2 behavior
    server.rbac.disableApplicationFineGrainedRBACInheritance: "false"

    # Resource tracking method - keeping label-based for now
    # v3 defaults to annotation-based tracking
    # Consider migrating to annotations after confirming stability
    application.resourceTrackingMethod: "label"

    # Resource exclusions - preserve v2 behavior
    # v3 adds default exclusions for Endpoints, EndpointSlice, Lease, and certain CRDs
    # Since we use cert-manager and Cilium, explicitly configure exclusions
    resource.exclusions: |
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        clusters:
        - "*"

    resource.customizations.health.gateway.networking.k8s.io_HTTPRoute: |
      hs = {}

      if obj.status ~= nil and obj.status.parents ~= nil then
        for _, parent in ipairs(obj.status.parents) do
          if parent.conditions ~= nil then
            local accepted = nil
            local resolvedRefs = nil

            for _, condition in ipairs(parent.conditions) do
              if condition.type == "Accepted" then
                accepted = condition.status
              elseif condition.type == "ResolvedRefs" then
                resolvedRefs = condition.status
              end
            end

            if accepted == "False" or resolvedRefs == "False" then
              hs.status = "Degraded"
              hs.message = "HTTPRoute was rejected or has unresolved references"
              return hs
            end

            if accepted == "True" and (resolvedRefs == nil or resolvedRefs == "True") then
              hs.status = "Healthy"
              hs.message = "HTTPRoute accepted by Gateway"
              return hs
            end
          end
        end
      end

      -- Some Gateway controllers can serve traffic before backfilling route status.
      -- Treat missing status as healthy unless the controller reports a negative condition.
      hs.status = "Healthy"
      hs.message = "No negative HTTPRoute status reported"
      return hs

  # RBAC configuration - CRITICAL for v3
  # v3 enforces logs RBAC (no opt-out flag)
  # Grant admin role access to logs
  rbac:
    policy.default: role:readonly
    policy.csv: |
      # Grant admin full access including logs
      p, role:admin, logs, get, *, allow
      p, role:admin, applications, *, *, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, projects, *, *, allow
      p, role:admin, accounts, *, *, allow
      p, role:admin, certificates, *, *, allow
      p, role:admin, gpgkeys, *, *, allow

      # Readonly role (no logs access by default)
      p, role:readonly, applications, get, *, allow
      p, role:readonly, projects, get, *, allow

      # Bind admin user to admin role
      g, admin, role:admin
