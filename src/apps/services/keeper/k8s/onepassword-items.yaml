---
# Before deploying Keeper, create these items in the 1Password kubernetes vault:
#
# 1. Item: keeper-app-secrets
#    Fields:
#      - BETTER_AUTH_SECRET (password): Generate with `openssl rand -base64 32`
#      - ENCRYPTION_KEY (password): Generate with `openssl rand -base64 32`
#
# 2. Item: keeper-postgresql
#    Fields:
#      - password (password): PostgreSQL password for the keeper user
#
# 3. Item: keeper-redis
#    Fields:
#      - redis-password (password): Redis password
#
# 4. Item: keeper-google-oauth
#    Fields:
#      - GOOGLE_CLIENT_ID (text): Google OAuth web client ID
#      - GOOGLE_CLIENT_SECRET (password): Google OAuth client secret
#
# Microsoft OAuth is still intentionally not wired in this repo yet.
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: keeper-app-secrets
  namespace: keeper
spec:
  itemPath: "vaults/kubernetes/items/keeper-app-secrets"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: keeper-postgresql
  namespace: keeper
spec:
  itemPath: "vaults/kubernetes/items/keeper-postgresql"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: keeper-redis
  namespace: keeper
spec:
  itemPath: "vaults/kubernetes/items/keeper-redis"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: keeper-google-oauth
  namespace: keeper
spec:
  itemPath: "vaults/kubernetes/items/keeper-google-oauth"
