apiVersion: v1
kind: ServiceAccount
metadata:
  name: awtrix-publisher
  namespace: awtrix
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: awtrix-publisher-config
  namespace: awtrix
data:
  AWTRIX_TOPIC_PREFIX: awtrix/office
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: awtrix-publisher
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: awtrix-publisher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: awtrix-publisher
subjects:
  - kind: ServiceAccount
    name: awtrix-publisher
    namespace: awtrix
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: awtrix-publisher
  namespace: awtrix
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: awtrix-publisher
          restartPolicy: Never
          automountServiceAccountToken: true
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: snapshot-cluster
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -ec
                - |
                  ready_and_total="$(kubectl get nodes --no-headers | awk '
                    BEGIN { ready = 0; total = 0 }
                    {
                      total++
                      if ($2 ~ /^Ready/) {
                        ready++
                      }
                    }
                    END { printf "%d %d\n", ready, total }
                  ')"
                  ready_nodes="$(echo "$ready_and_total" | awk '{print $1}')"
                  total_nodes="$(echo "$ready_and_total" | awk '{print $2}')"

                  pod_issues="$(kubectl get pods -A --no-headers | awk '
                    $2 !~ /^awtrix-publisher-/ &&
                    $4 != "Running" && $4 != "Completed" && $4 != "Succeeded" { bad++ }
                    END { print bad + 0 }
                  ')"

                  k8s_version="$(kubectl get nodes -o jsonpath="{.items[0].status.nodeInfo.kubeletVersion}")"

                  if [ "$ready_nodes" -eq "$total_nodes" ] && [ "$pod_issues" -eq 0 ]; then
                    cluster_color='[0,255,0]'
                    cluster_text="norns ${ready_nodes}/${total_nodes} ok ${k8s_version#v}"
                  elif [ "$ready_nodes" -eq "$total_nodes" ]; then
                    cluster_color='[255,170,0]'
                    cluster_text="norns ${pod_issues} pod ${k8s_version#v}"
                  else
                    cluster_color='[255,0,0]'
                    cluster_text="norns ${ready_nodes}/${total_nodes} ready"
                  fi

                  printf '{"text":"%s","color":%s,"save":true,"lifetime":3900}\n' \
                    "$cluster_text" "$cluster_color" > /work/cluster.json
              volumeMounts:
                - name: work
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
            - name: publish-awtrix
              image: eclipse-mosquitto:2
              command:
                - /bin/sh
                - -ec
                - |
                  mosquitto_pub -h mosquitto-client.awtrix.svc.cluster.local -p 1883 \
                    -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD" \
                    -t "${AWTRIX_TOPIC_PREFIX}/custom/cluster" -f /work/cluster.json
                  mosquitto_pub -h mosquitto-client.awtrix.svc.cluster.local -p 1883 \
                    -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD" -n \
                    -t "${AWTRIX_TOPIC_PREFIX}/custom/workloads"
                  mosquitto_pub -h mosquitto-client.awtrix.svc.cluster.local -p 1883 \
                    -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD" -n \
                    -t "${AWTRIX_TOPIC_PREFIX}/custom/version"
              env:
                - name: AWTRIX_TOPIC_PREFIX
                  valueFrom:
                    configMapKeyRef:
                      name: awtrix-publisher-config
                      key: AWTRIX_TOPIC_PREFIX
                - name: MQTT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: awtrix-mqtt-credentials
                      key: username
                - name: MQTT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: awtrix-mqtt-credentials
                      key: password
              volumeMounts:
                - name: work
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1883
          containers:
            - name: hold
              image: busybox:1.37
              command:
                - /bin/sh
                - -ec
                - "echo published"
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  cpu: 20m
                  memory: 16Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: work
              emptyDir: {}
