apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: awtrix
data:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data/
    autosave_interval 180
    log_dest stdout

    listener 1883 0.0.0.0
    allow_anonymous false
    password_file /mosquitto/config/passwd
