apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: paperclip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperclip
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-data
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /paperclip
              chown -R 1000:1000 /paperclip
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /paperclip
        - name: wait-for-postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready -h paperclip-postgresql -p 5432 -U paperclip -d paperclip; do
                sleep 2
              done
      containers:
        - name: paperclip
          image: ghcr.io/paperclipai/paperclip@sha256:beb09c3e5e0fd372ab89f5761464b329c201d89bdd4d54b49ef58f7a0532e561
          imagePullPolicy: IfNotPresent
          args:
            - /bin/sh
            - -ec
            - |
              instance_home="/paperclip/instances/default"
              config_path="${instance_home}/config.json"
              encoded_password="$(node -e 'process.stdout.write(encodeURIComponent(process.env.DATABASE_PASSWORD || ""))')"
              export DATABASE_URL="postgres://paperclip:${encoded_password}@paperclip-postgresql:5432/paperclip"
              export PAPERCLIP_CONFIG="${config_path}"

              node <<'NODE'
              const crypto = require("crypto");
              const fs = require("fs");

              const home = "/paperclip/instances/default";
              const configPath = `${home}/config.json`;
              const keyPath = `${home}/secrets/master.key`;
              const hosts = [
                "paperclip.internal",
                "paperclip.paperclip.svc.cluster.local",
                "paperclip.paperclip.svc",
                "paperclip",
                "localhost",
                "127.0.0.1",
              ];

              if (!process.env.DATABASE_URL) {
                throw new Error("DATABASE_URL is required");
              }

              fs.mkdirSync(`${home}/data/backups`, { recursive: true });
              fs.mkdirSync(`${home}/data/storage`, { recursive: true });
              fs.mkdirSync(`${home}/logs`, { recursive: true });
              fs.mkdirSync(`${home}/secrets`, { recursive: true });

              if (!fs.existsSync(keyPath)) {
                fs.writeFileSync(keyPath, `${crypto.randomBytes(32).toString("hex")}\n`, { mode: 0o600 });
              }

              let existing = {};
              if (fs.existsSync(configPath)) {
                existing = JSON.parse(fs.readFileSync(configPath, "utf8"));
              }

              const config = {
                ...existing,
                $meta: {
                  version: 1,
                  updatedAt: new Date().toISOString(),
                  source: "configure",
                },
                database: {
                  mode: "postgres",
                  connectionString: process.env.DATABASE_URL,
                  backup: {
                    enabled: true,
                    intervalMinutes: 60,
                    retentionDays: 7,
                    dir: `${home}/data/backups`,
                  },
                },
                logging: {
                  mode: "file",
                  logDir: `${home}/logs`,
                },
                server: {
                  deploymentMode: "authenticated",
                  exposure: "private",
                  bind: "lan",
                  host: "0.0.0.0",
                  port: 3100,
                  allowedHostnames: hosts,
                  serveUi: true,
                },
                auth: {
                  baseUrlMode: "explicit",
                  disableSignUp: false,
                  publicBaseUrl: "http://paperclip.internal",
                },
                telemetry: {
                  enabled: false,
                },
                storage: existing.storage ?? {
                  provider: "local_disk",
                  localDisk: {
                    baseDir: `${home}/data/storage`,
                  },
                  s3: {
                    bucket: "paperclip",
                    region: "us-east-1",
                    prefix: "",
                    forcePathStyle: false,
                  },
                },
                secrets: existing.secrets ?? {
                  provider: "local_encrypted",
                  strictMode: false,
                  localEncrypted: {
                    keyFilePath: keyPath,
                  },
                },
              };

              fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
              NODE

              exec node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
          ports:
            - name: http
              containerPort: 3100
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-postgresql
                  key: password
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: SERVE_UI
              value: "true"
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: authenticated
            - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
              value: private
            - name: PAPERCLIP_PUBLIC_URL
              value: http://paperclip.internal
            - name: PAPERCLIP_ALLOWED_HOSTNAMES
              value: paperclip.internal,paperclip.paperclip.svc.cluster.local,paperclip.paperclip.svc,paperclip,localhost,127.0.0.1
            - name: PAPERCLIP_TELEMETRY_DISABLED
              value: "1"
            - name: DO_NOT_TRACK
              value: "1"
          envFrom:
            - secretRef:
                name: paperclip-app-secrets
          volumeMounts:
            - name: data
              mountPath: /paperclip
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: paperclip.internal
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: paperclip.internal
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: paperclip.internal
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
