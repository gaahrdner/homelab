apiVersion: v1
kind: Service
metadata:
  name: paperclip-postgresql
  namespace: paperclip
spec:
  selector:
    app.kubernetes.io/name: paperclip-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paperclip-postgresql
  namespace: paperclip
spec:
  serviceName: paperclip-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperclip-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperclip-postgresql
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: paperclip
            - name: POSTGRES_USER
              value: paperclip
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-postgresql
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.19.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: "localhost:5432/paperclip?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: paperclip
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: paperclip-postgresql
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
