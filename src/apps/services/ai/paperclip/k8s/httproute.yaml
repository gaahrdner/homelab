apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperclip
  namespace: paperclip
spec:
  parentRefs:
    - name: internal
      namespace: gateway
  hostnames:
    - paperclip.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: paperclip
          port: 3100
