apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-postgresql-exporter
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-postgresql-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgresql-exporter
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: /metrics
      labels:
        app.kubernetes.io/name: langfuse-postgresql-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: langfuse-postgresql:5432/postgres_langfuse?sslmode=disable
            - name: DATA_SOURCE_USER
              value: langfuse
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: langfuse-postgresql
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-redis-exporter
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-redis-exporter
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: /metrics
      labels:
        app.kubernetes.io/name: langfuse-redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.86.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://langfuse-redis-primary:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-redis
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
