apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: qwen-exec
        litellm_params:
          model: openai/Qwen/Qwen3.6-35B-A3B-FP8
          api_base: http://100.89.191.81:8000/v1
          api_key: dummy
      - model_name: qwen-review
        litellm_params:
          model: openai/Qwen/Qwen3.6-35B-A3B-FP8
          api_base: http://100.89.191.81:8000/v1
          api_key: dummy
      - model_name: ds4-plan
        litellm_params:
          model: openai/deepseek-v4-flash
          api_base: http://100.100.70.24:8000/v1
          api_key: dummy
    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
    litellm_settings:
      database_url: os.environ/DATABASE_URL
      callbacks: ["prometheus", "langfuse_otel"]
