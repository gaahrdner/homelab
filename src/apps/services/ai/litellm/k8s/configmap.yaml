apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: vllm
        litellm_params:
          model: openai/qwen3.6-27b-fp8
          api_base: os.environ/VLLM_1_API_BASE
          api_key: os.environ/VLLM_1_API_KEY
    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
    litellm_settings:
      database_url: os.environ/DATABASE_URL
      callbacks: ["prometheus", "langfuse_otel"]
