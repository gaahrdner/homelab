apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      annotations:
        homelab.gaahrdner.com/config-revision: together-ai-prefix-20260523
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: /metrics
      labels:
        app.kubernetes.io/name: litellm
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.83.14-stable.patch.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
          args:
            - |
              export DATABASE_URL="postgresql://litellm:${DATABASE_PASSWORD}@litellm-postgresql/litellm"
              exec litellm --config /app/config/config.yaml
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-postgresql
                  key: password
            - name: PROXY_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: master-key
            - name: LANGFUSE_RELEASE
              value: litellm-v1.83.14-stable.patch.2
            - name: LANGFUSE_OTEL_HOST
              value: http://langfuse-web.langfuse.svc.cluster.local:3000
            - name: LANGFUSE_TRACING_ENVIRONMENT
              value: norns
            - name: LITELLM_LOG
              value: INFO
          envFrom:
            - secretRef:
                name: litellm-vllm-upstreams
            - secretRef:
                name: litellm-together
                optional: true
            - secretRef:
                name: langfuse-project-api-keys
          volumeMounts:
            - name: config
              mountPath: /app/config
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
