apiVersion: v1
kind: ServiceAccount
metadata:
  name: gc-agent
  namespace: gascity
  labels:
    app.kubernetes.io/part-of: gascity
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gc-agent
  namespace: gascity
  labels:
    app.kubernetes.io/part-of: gascity
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gc-agent
  namespace: gascity
  labels:
    app.kubernetes.io/part-of: gascity
subjects:
  - kind: ServiceAccount
    name: gc-agent
    namespace: gascity
roleRef:
  kind: Role
  name: gc-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gc-controller
  namespace: gascity
  labels:
    app.kubernetes.io/part-of: gascity
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gc-controller
  namespace: gascity
  labels:
    app.kubernetes.io/part-of: gascity
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gc-controller
  namespace: gascity
  labels:
    app.kubernetes.io/part-of: gascity
subjects:
  - kind: ServiceAccount
    name: gc-controller
    namespace: gascity
roleRef:
  kind: Role
  name: gc-controller
  apiGroup: rbac.authorization.k8s.io
