apiVersion: v1
kind: ServiceAccount
metadata:
  name: gascity-controller
  namespace: gascity
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gascity-runner-manager
  namespace: agents
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - persistentvolumeclaims
      - pods
      - pods/log
      - secrets
      - serviceaccounts
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gascity-controller
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: gascity-controller
    namespace: gascity
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gascity-runner-manager
