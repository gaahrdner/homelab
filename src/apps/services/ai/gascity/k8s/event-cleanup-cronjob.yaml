apiVersion: batch/v1
kind: CronJob
metadata:
  name: gc-event-cleanup
  namespace: gascity
  labels:
    app: gc-event-cleanup
    app.kubernetes.io/part-of: gascity
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: gc-controller
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cleanup
              image: bitnami/kubectl:1.36.0
              env:
                - name: HOME
                  value: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              command:
                - sh
                - -c
                - |
                  cutoff=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                    || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
                  echo "Pruning event ConfigMaps created before $cutoff..."
                  kubectl -n gascity get configmaps -l gc/component=event \
                    -o json | jq -r --arg cutoff "$cutoff" \
                    '.items[] | select(.metadata.creationTimestamp < $cutoff) | .metadata.name' \
                  | while read -r name; do
                      echo "  deleting $name"
                      kubectl -n gascity delete configmap "$name"
                    done
                  echo "Done."
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
