apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dolt
  namespace: gascity
  labels:
    app: dolt
    app.kubernetes.io/part-of: gascity
spec:
  serviceName: dolt
  replicas: 1
  selector:
    matchLabels:
      app: dolt
  template:
    metadata:
      labels:
        app: dolt
        app.kubernetes.io/part-of: gascity
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-user
          image: dolthub/dolt:1.88.0
          env:
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              dolt sql-server --host=127.0.0.1 --port=3307 --data-dir=/var/lib/dolt &
              pid=$!
              for i in $(seq 1 30); do
                dolt --host=127.0.0.1 --port=3307 --user=root --no-tls sql -q "SELECT 1" 2>/dev/null && break
                sleep 1
              done
              DOLT_CLI_PASSWORD="" dolt --host=127.0.0.1 --port=3307 --user=root --no-tls sql -q \
                "CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY ''; GRANT ALL PRIVILEGES ON *.* TO 'root'@'%'"
              kill $pid 2>/dev/null
              wait $pid 2>/dev/null || true
          volumeMounts:
            - name: dolt-data
              mountPath: /var/lib/dolt
            - name: tmp
              mountPath: /tmp
      containers:
        - name: dolt
          image: dolthub/dolt:1.88.0
          env:
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - dolt
            - sql-server
            - --host=0.0.0.0
            - --port=3307
            - --data-dir=/var/lib/dolt
            - --max-connections=500
          ports:
            - name: mysql
              containerPort: 3307
              protocol: TCP
          volumeMounts:
            - name: dolt-data
              mountPath: /var/lib/dolt
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: dolt-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 20Gi
