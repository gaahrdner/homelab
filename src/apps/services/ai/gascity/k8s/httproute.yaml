apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gascity
  namespace: gascity
spec:
  parentRefs:
    - name: internal
      namespace: gateway
  hostnames:
    - gascity.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v0
      backendRefs:
        - name: gascity
          port: 8372
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: gascity
          port: 8372
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gascity
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gascity-ip-fallback
  namespace: gascity
spec:
  parentRefs:
    - name: internal
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v0
      backendRefs:
        - name: gascity
          port: 8372
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: gascity
          port: 8372
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gascity
          port: 8081
