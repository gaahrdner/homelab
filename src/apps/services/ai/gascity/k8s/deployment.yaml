apiVersion: apps/v1
kind: Deployment
metadata:
  name: gascity
  namespace: gascity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gascity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gascity
    spec:
      serviceAccountName: gascity-controller
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gascity
          image: ghcr.io/gaahrdner/gascity-controller:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: data
              mountPath: /var/lib/gascity
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /var/lib/gascity/city/city.toml
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /var/lib/gascity/city/city.toml
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gascity-data
