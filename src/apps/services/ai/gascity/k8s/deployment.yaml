apiVersion: apps/v1
kind: Deployment
metadata:
  name: gascity
  namespace: gascity
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gascity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gascity
    spec:
      serviceAccountName: gascity-controller
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gascity
          image: ghcr.io/gaahrdner/gascity-controller:main
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
          args:
            - |
              mkdir -p "${HOME}" /var/lib/gascity/city "${HOME}/.gc"

              cat > "${HOME}/.gc/supervisor.toml" <<'EOF'
              [supervisor]
              bind = "0.0.0.0"
              port = 8372
              allow_mutations = false
              EOF

              if [ ! -f /var/lib/gascity/city/city.toml ]; then
                gc init /var/lib/gascity/city
              fi

              cd /var/lib/gascity/city
              gc start
              exec gc dashboard serve --city /var/lib/gascity/city --port 8080 --api http://gascity.internal
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: data
              mountPath: /var/lib/gascity
          ports:
            - name: http
              containerPort: 8080
            - name: api
              containerPort: 8372
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: api
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gascity-data
