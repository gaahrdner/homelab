apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli
  namespace: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: signal-cli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signal-cli
    spec:
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: signal-cli
          image: ghcr.io/gaahrdner/signal-cli-daemon:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          envFrom:
            - secretRef:
                name: hermes-signal
                optional: true
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /var/lib/signal-cli
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: signal-cli-data
