apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostfolio
  namespace: ghostfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ghostfolio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ghostfolio
    spec:
      containers:
        - name: ghostfolio
          image: ghostfolio/ghostfolio:3.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3333
          env:
            - name: ACCESS_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: ghostfolio-app-secrets
                  key: ACCESS_TOKEN_SALT
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ghostfolio-app-secrets
                  key: JWT_SECRET_KEY
            - name: POSTGRES_DB
              value: ghostfolio
            - name: POSTGRES_USER
              value: ghostfolio
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghostfolio-postgresql
                  key: password
            - name: REDIS_HOST
              value: ghostfolio-redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghostfolio-redis
                  key: redis-password
            - name: REDIS_DB
              value: "0"
            - name: DATABASE_URL
              value: postgresql://ghostfolio:$(POSTGRES_PASSWORD)@ghostfolio-postgresql:5432/ghostfolio?connect_timeout=300
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3333"
            - name: ROOT_URL
              value: http://ghostfolio.internal
            - name: REQUEST_TIMEOUT
              value: "5000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
