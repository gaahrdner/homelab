---
# Before deploying Ghostfolio, create these items in the 1Password kubernetes
# vault:
#
# 1. Item: ghostfolio-app-secrets
#    Fields:
#      - ACCESS_TOKEN_SALT (password): Generate with `openssl rand -base64 32`
#      - JWT_SECRET_KEY (password): Generate with `openssl rand -base64 32`
#
# 2. Item: ghostfolio-postgresql
#    Fields:
#      - password (password): PostgreSQL password for the ghostfolio user
#
# 3. Item: ghostfolio-redis
#    Fields:
#      - redis-password (password): Redis password
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: ghostfolio-app-secrets
  namespace: ghostfolio
spec:
  itemPath: "vaults/kubernetes/items/ghostfolio-app-secrets"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: ghostfolio-postgresql
  namespace: ghostfolio
spec:
  itemPath: "vaults/kubernetes/items/ghostfolio-postgresql"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: ghostfolio-redis
  namespace: ghostfolio
spec:
  itemPath: "vaults/kubernetes/items/ghostfolio-redis"
