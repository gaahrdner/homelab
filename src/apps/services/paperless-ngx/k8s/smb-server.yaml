---
apiVersion: v1
kind: Service
metadata:
  name: paperless-smb
  namespace: paperless-ngx
  labels:
    app: paperless-smb
spec:
  type: LoadBalancer
  ports:
    - name: smb
      port: 445
      targetPort: 445
      protocol: TCP
  selector:
    app: paperless-smb

---
apiVersion: v1
kind: Service
metadata:
  name: paperless-smb-metrics
  namespace: paperless-ngx
  labels:
    app: paperless-smb
    monitoring: samba-metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9922
      targetPort: metrics
      protocol: TCP
  selector:
    app: paperless-smb

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: paperless-smb
  namespace: paperless-ngx
spec:
  selector:
    matchLabels:
      app: paperless-smb
      monitoring: samba-metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-smb
  namespace: paperless-ngx
  labels:
    app: paperless-smb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless-smb
  template:
    metadata:
      labels:
        app: paperless-smb
    spec:
      # Schedule on same node as paperless-ngx to share RWO volume
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: paperless-ngx
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: init-samba-state
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /run/samba
              mkdir -p /var/lib/samba/private/msg.sock
              mkdir -p /var/cache/samba
              chmod 0755 /run/samba /var/lib/samba /var/lib/samba/private /var/cache/samba
              chmod 0700 /var/lib/samba/private/msg.sock
          volumeMounts:
            - name: samba-run
              mountPath: /run/samba
            - name: samba-lib
              mountPath: /var/lib/samba
            - name: samba-cache
              mountPath: /var/cache/samba
      containers:
        - name: samba
          image: dperson/samba:latest
          ports:
            - name: smb
              containerPort: 445
          env:
            # Create a share named "paperless" at /consume, browseable, read-only: no, guest ok: yes
            # Format: "share_name;path;browsable;read-only;guest;users;admins;writelist;comment"
            - name: SHARE
              value: "paperless;/consume;yes;no;yes;all;none;;ScanSnap Document Upload"
            # Disable user authentication (guest access)
            - name: USERID
              value: "1000"
            - name: GROUPID
              value: "1000"
          volumeMounts:
            - name: consume
              mountPath: /consume
            - name: samba-run
              mountPath: /run/samba
            - name: samba-lib
              mountPath: /var/lib/samba
            - name: samba-cache
              mountPath: /var/cache/samba
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              add:
                - CAP_NET_BIND_SERVICE
        - name: samba-metrics
          image: quay.io/samba.org/samba-metrics:latest
          ports:
            - name: metrics
              containerPort: 9922
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: samba-run
              mountPath: /run/samba
            - name: samba-lib
              mountPath: /var/lib/samba
            - name: samba-cache
              mountPath: /var/cache/samba
      volumes:
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: samba-run
          emptyDir: {}
        - name: samba-lib
          emptyDir: {}
        - name: samba-cache
          emptyDir: {}
