apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: velero-r2-credentials
  namespace: paperless-ngx
spec:
  itemPath: "vaults/mbn7rk3d5gfgofrv3a2zt2tdoe/items/velero-r2-credentials"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-logical-backup
  namespace: paperless-ngx
spec:
  schedule: "10 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup
              emptyDir: {}
          initContainers:
            - name: dump
              image: postgres:18-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: paperless-postgresql
                      key: password
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  pg_dump \
                    --host=paperless-postgresql \
                    --username=paperless \
                    --dbname=paperless \
                    --format=custom \
                    --file=/backup/paperless.dump
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli:2.35.24
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: velero-r2-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: velero-r2-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINTS
                  valueFrom:
                    secretKeyRef:
                      name: velero-r2-credentials
                      key: AWS_ENDPOINTS
                - name: AWS_DEFAULT_REGION
                  value: auto
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  stamp="$(date -u +%Y/%m/%d/%H%M%SZ)"
                  aws s3 cp /backup/paperless.dump "s3://homelab-backup/logical-dumps/paperless/postgresql/${stamp}.dump" \
                    --endpoint-url "${AWS_ENDPOINTS}" \
                    --only-show-errors
              volumeMounts:
                - name: backup
                  mountPath: /backup
