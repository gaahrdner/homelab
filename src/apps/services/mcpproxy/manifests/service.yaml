apiVersion: v1
kind: Service
metadata:
  name: mcpproxy
  namespace: mcpproxy
  annotations:
    external-dns.alpha.kubernetes.io/hostname: mcp.internal
    io.cilium/lb-ipam-ips: "192.168.0.206"
spec:
  type: LoadBalancer
  selector:
    app: mcpproxy
  ports:
    - name: http
      port: 80
      targetPort: 8080
