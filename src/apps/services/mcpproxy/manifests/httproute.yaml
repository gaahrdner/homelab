apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcpproxy
  namespace: mcpproxy
spec:
  hostnames:
    - mcp.internal
  parentRefs:
    - name: internal
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mcpproxy
          port: 80
