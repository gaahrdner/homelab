apiVersion: apps/v1
kind: Deployment
metadata:
  name: unla
  namespace: unla
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unla
  template:
    metadata:
      labels:
        app: unla
    spec:
      containers:
        - name: unla
          image: ghcr.io/amoylab/unla/allinone:v0.9.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ENV
              value: production
            - name: TZ
              value: America/Chicago
            - name: SUPER_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: unla-admin
                  key: username
            - name: SUPER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unla-admin
                  key: password
            - name: APISERVER_JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: unla-admin
                  key: jwt-secret-key
            - name: APISERVER_DB_TYPE
              value: sqlite
            - name: APISERVER_DB_NAME
              value: /data/unla.db
            - name: GATEWAY_STORAGE_TYPE
              value: db
            - name: GATEWAY_DB_TYPE
              value: sqlite
            - name: GATEWAY_DB_NAME
              value: /data/unla.db
          ports:
            - name: web
              containerPort: 80
            - name: mcp
              containerPort: 5235
          readinessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: unla-data
