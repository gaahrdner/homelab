apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    chart: loki
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 13.6.1
    helm:
      valuesObject:
        deploymentMode: Monolithic

        loki:
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h

          storage:
            type: filesystem

          limits_config:
            ingestion_rate_mb: 16
            ingestion_burst_size_mb: 32
            retention_period: 168h
            reject_old_samples: true
            reject_old_samples_max_age: 8760h
            allow_structured_metadata: true
            volume_enabled: true

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
          persistence:
            enabled: true
            storageClass: longhorn
            size: 10Gi

        write:
          replicas: 0

        read:
          replicas: 0

        backend:
          replicas: 0

        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        gateway:
          enabled: false

        test:
          enabled: false

        lokiCanary:
          enabled: false

        memberlist:
          service:
            publishNotReadyAddresses: true

        monitoring:
          dashboards:
            enabled: true
            namespace: monitoring
          rules:
            enabled: true
          serviceMonitor:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
