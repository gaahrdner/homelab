# Create a 1Password item named "tailscale-operator-oauth" in the "kubernetes"
# vault before syncing this app.
#
# Required fields:
# - client_id: <Tailscale OAuth client ID>
# - client_secret: <Tailscale OAuth client secret>
#
# The OAuth client should have write scopes for:
# - Devices Core
# - Auth Keys
# - Services
#
# The operator's Helm chart reads these values from the Secret named
# "operator-oauth", so this OnePasswordItem must keep that metadata.name.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: operator-oauth
  namespace: tailscale
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  itemPath: "vaults/kubernetes/items/tailscale-operator-oauth"
