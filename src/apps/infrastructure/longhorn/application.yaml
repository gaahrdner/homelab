apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  sources:
    - chart: longhorn
      repoURL: https://charts.longhorn.io
      targetRevision: 1.10.0
      helm:
        valuesObject:
          preUpgradeChecker:
            jobEnabled: false

          persistence:
            defaultClass: true
            defaultClassReplicaCount: 3
            defaultFsType: ext4
            reclaimPolicy: Delete
            defaultDataLocality: disabled

          service:
            ui:
              type: LoadBalancer
            manager:
              type: ClusterIP

          defaultSettings:
            storageMinimalAvailablePercentage: "20"
            createDefaultDiskLabeledNodes: false
            nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
            replicaSoftAntiAffinity: false
            replicaAutoBalance: best-effort
            backupTarget: s3://homelab-backup@us-east-1/longhorn/
            backupTargetCredentialSecret: velero-r2-credentials
            backupstorePollInterval: 300
            allowRecurringJobWhileVolumeDetached: true
            restoreVolumeRecurringJobs: true
            recurringSuccessfulJobsHistoryLimit: "3"
            recurringFailedJobsHistoryLimit: "3"

          image:
            pullPolicy: IfNotPresent

          longhornManager:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

          longhornDriver:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

          longhornUI:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
    - repoURL: https://github.com/gaahrdner/homelab.git
      targetRevision: HEAD
      path: src/apps/infrastructure/longhorn/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system

  ignoreDifferences:
    - kind: Service
      jqPathExpressions:
        - .spec.ports[].nodePort

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
