apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  sources:
    - chart: velero
      repoURL: https://vmware-tanzu.github.io/helm-charts
      targetRevision: 11.1.1
      helm:
        valuesObject:
          configuration:
            features: EnableCSI
            velero:
              image:
                repository: velero/velero
                tag: v1.17.1
            backupStorageLocation:
              - name: default
                provider: aws
                bucket: homelab-backup
                config:
                  region: auto
                  s3Url: https://48efe0f369d822f5035c1e179d993127.r2.cloudflarestorage.com
            volumeSnapshotLocation:
              - name: default
                provider: csi
                config:
                  snapshotClass: longhorn
          upgradeCRDs: false
          installCRDs: false
          credentials:
            existingSecret: velero-cloud-credentials
          initContainers:
            - name: velero-plugin-for-aws
              image: velero/velero-plugin-for-aws:v1.14.2
              volumeMounts:
                - mountPath: /target
                  name: plugins
          deployNodeAgent: true
          csi:
            enable: true
            defaultVolumesnapshotClass: longhorn
          podAnnotations:
            sidecar.istio.io/inject: "false"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
    - repoURL: https://github.com/gaahrdner/homelab.git
      targetRevision: HEAD
      path: src/apps/infrastructure/velero/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
