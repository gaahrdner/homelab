name: Build Signal CLI Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/signal-cli-image.yaml
      - src/apps/services/ai/hermes/image/signal-cli/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/gaahrdner/signal-cli-daemon
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: src/apps/services/ai/hermes/image/signal-cli
          file: src/apps/services/ai/hermes/image/signal-cli/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
